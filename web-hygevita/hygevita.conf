# Sitio principal Hygevita (hygevita.com y hygevita.app)
server {
    listen 80;
    listen [::]:80;
    server_name hygevita.com www.hygevita.com hygevita.app www.hygevita.app;

    root /var/www/hygevita;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache favicon and images
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Apple Universal Links / Android App Links
    location = /.well-known/apple-app-site-association {
        default_type application/json;
    }
    location = /.well-known/assetlinks.json {
        default_type application/json;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files (excepto .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
